<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADGB DEV | RDR2 Modding Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* Variables de diseño profesional */
        :root {
            --bg-main: #0b0b0d;
            --bg-card: #141417;
            --bg-card-hover: #1c1c21;
            --accent-red: #ff2e2e;
            --accent-glow: rgba(255, 46, 46, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            
            /* Bordes súper redondeados solicitados */
            --border-rounded-lg: 24px;
            --border-rounded-md: 14px;
            --border-rounded-sm: 8px;
            
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* Encabezado */
        header {
            max-width: 1200px;
            margin: 40px auto 20px auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background-color: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 6px 16px;
            border-radius: 30px; /* Completamente redondeado */
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        /* Sección Hero (Título Principal) */
        .hero-section {
            max-width: 1200px;
            margin: 0 auto 50px auto;
            padding: 40px 20px;
            text-align: center;
        }

        .hero-section h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .hero-section p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            max-width: 650px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* Contenedor de Apartados (Grid) */
        .sections-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
        }

        @media (max-width: 768px) {
            .sections-container {
                grid-template-columns: 1fr;
            }
            .hero-section h1 {
                font-size: 2.5rem;
            }
        }

        /* Tarjetas con Diseño Profesional Redondeado */
        .mod-card {
            background-color: var(--bg-card);
            border-radius: var(--border-rounded-lg); /* Esquinas muy redondeadas y suaves */
            padding: 45px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Efecto de iluminación sutil al pasar el mouse */
        .mod-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(255, 46, 46, 0.07), transparent 60%);
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .mod-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 46, 46, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 46, 46, 0.03);
            background-color: var(--bg-card-hover);
        }

        .mod-card:hover::before {
            opacity: 1;
        }

        .card-header {
            margin-bottom: 25px;
        }
